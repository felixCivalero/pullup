name: Deploy Pullup

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy-pullup.yml"

# Prevent concurrent deploys of the same branch from racing. A new push
# while a deploy is in progress cancels the previous run before starting
# the new one — so we never have two `npm install` processes clobbering
# the same node_modules tree on EC2 (which is what produced the tar
# ENOENT errors on 2026-05-22).
#
# This guards CI-vs-CI only. Do NOT manually `ssh` in and run `npm ci` /
# `npm run build` / `pm2 restart` while a deploy may be in flight — a manual
# build racing CI's `npm ci` corrupts node_modules mid-resolve ("Failed to
# resolve entry for package react"), and a manual `pm2 restart` colliding with
# CI's reload makes the post-deploy health check hit a down API (Connection
# refused → rollback). Both happened 2026-06-08. Push and let CI own the deploy.
concurrency:
  group: deploy-pullup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            export PATH=$PATH:/usr/local/bin:/usr/bin

            echo "🚀 Starting Pullup deployment..."

            cd ~/pullup

            echo "📥 Pulling latest code..."
            git fetch --all
            git reset --hard origin/master

            echo "🔐 Loading backend environment (if available)..."
            if [ -f backend/.env ]; then
              set -a
              . backend/.env
              set +a
              echo "✅ Loaded backend/.env"
            else
              echo "⚠️ backend/.env not found; continuing without auto-loading env" >&2
            fi

            echo "🔎 Checking Node.js and npm..."
            if ! command -v node >/dev/null 2>&1; then
              echo "❌ Node.js is not installed or not on PATH" >&2
              exit 1
            fi
            if ! command -v npm >/dev/null 2>&1; then
              echo "❌ npm is not installed or not on PATH" >&2
              exit 1
            fi
            echo "✅ Node.js: $(node -v), npm: $(npm -v)"

            # ─── FRONTEND BUILD (atomic swap) ────────────────────────────
            # Build into dist-staging so the live `dist` only gets touched
            # AFTER the smoke test passes. On failure, dist is untouched
            # and the previous bundle keeps serving.
            echo "📦 Installing frontend dependencies..."
            cd frontend
            if [ -f package-lock.json ]; then
              npm ci --include=dev
            else
              npm install --include=dev
            fi

            echo "🏗 Building frontend → dist-staging..."
            rm -rf dist-staging
            npm run build -- --outDir dist-staging

            echo "🔍 Smoke test on dist-staging..."
            # No dev URLs leaked into the bundle. (We only check for the
            # exact ports our app uses in dev — 3001/5173 — to avoid
            # false positives from vendor libs that have their own
            # localhost:NNNN defaults baked in.)
            if grep -qE "(localhost:3001|localhost:5173|127\.0\.0\.1:3001)" dist-staging/assets/*.js 2>/dev/null; then
              echo "❌ SMOKE TEST FAILED: dev URL leaked into bundle:" >&2
              grep -oE "(localhost:3001|localhost:5173|127\.0\.0\.1:3001)[^\"',\)\}]{0,40}" dist-staging/assets/*.js | head -5 >&2
              rm -rf dist-staging
              exit 1
            fi
            # Production API host must actually be present in the bundle.
            # Accepts either api.pullup.se or the same-origin /api path.
            if ! grep -qE "(api\.pullup\.se|pullup\.se/api)" dist-staging/assets/*.js 2>/dev/null; then
              echo "❌ SMOKE TEST FAILED: no pullup.se API URL in bundle — env wasn't applied?" >&2
              rm -rf dist-staging
              exit 1
            fi
            echo "✅ Smoke test passed."

            echo "🔁 Atomic swap (previous bundle preserved as dist-prev)..."
            rm -rf dist-prev
            if [ -d dist ]; then
              mv dist dist-prev
            fi
            mv dist-staging dist
            echo "  active bundle: $(ls dist/assets/index-*.js 2>/dev/null | head -1)"

            # ─── BACKEND ─────────────────────────────────────────────────
            echo "📦 Installing backend dependencies..."
            cd ../backend
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "🔄 Reloading PM2 processes with updated env..."

            # API — reload (not restart) for zero-downtime. Falls back to
            # ecosystem.config.js on first deploy when the process isn't
            # yet registered.
            if ! pm2 reload pullup-api --update-env; then
              if [ -f ecosystem.config.js ]; then
                echo "ℹ️ pm2 process 'pullup-api' not found, starting from ecosystem.config.js"
                pm2 start ecosystem.config.js --only pullup-api
              else
                echo "❌ Failed to reload pm2 process 'pullup-api' and no ecosystem.config.js found" >&2
                exit 1
              fi
            fi

            # Email worker
            if ! pm2 reload pullup-email-worker --update-env; then
              if [ -f ecosystem.config.js ]; then
                echo "ℹ️ pm2 process 'pullup-email-worker' not found, starting from ecosystem.config.js"
                pm2 start ecosystem.config.js --only pullup-email-worker
              else
                echo "❌ Failed to reload pm2 process 'pullup-email-worker' and no ecosystem.config.js found" >&2
                exit 1
              fi
            fi

            pm2 save

            # ─── POST-DEPLOY HEALTH CHECK ────────────────────────────────
            # Poll, don't single-shot: a `pm2 reload` drops the listener for a
            # beat, so a curl at +2s can hit "Connection refused" on a perfectly
            # healthy deploy (that false-negative rolled back a good build on
            # 2026-06-08). Give the API up to ~30s to bind before we call it.
            echo "🏥 Backend health check (up to ~30s for the API to bind)..."
            HEALTH_OK=0
            for attempt in $(seq 1 15); do
              if curl -fsS -o /dev/null http://127.0.0.1:3001/mcp/health; then
                HEALTH_OK=1
                echo "✅ Healthy after ${attempt} attempt(s)."
                break
              fi
              sleep 2
            done
            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "❌ Backend health check failed after ~30s. Rolling back frontend..." >&2
              if [ -d dist-prev ]; then
                rm -rf dist-failed
                mv dist dist-failed
                mv dist-prev dist
                echo "🔙 Frontend rolled back to dist-prev."
              fi
              exit 1
            fi

            echo "✅ Deployment complete"
            pm2 status pullup-api
            pm2 status pullup-email-worker
