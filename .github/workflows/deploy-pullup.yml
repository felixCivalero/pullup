name: Deploy Pullup

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy-pullup.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH=$PATH:/usr/local/bin:/usr/bin

            echo "🚀 Starting Pullup deployment..."

            cd ~/pullup

            echo "📥 Pulling latest code..."
            git fetch --all
            git reset --hard origin/master

            echo "🔐 Loading backend environment (if available)..."
            if [ -f backend/.env ]; then
              set -a
              . backend/.env
              set +a
              echo "✅ Loaded backend/.env"
            else
              echo "⚠️ backend/.env not found; continuing without auto-loading env" >&2
            fi

            echo "🔎 Checking Node.js and npm..."
            if ! command -v node >/dev/null 2>&1; then
              echo "❌ Node.js is not installed or not on PATH" >&2
              exit 1
            fi
            if ! command -v npm >/dev/null 2>&1; then
              echo "❌ npm is not installed or not on PATH" >&2
              exit 1
            fi
            echo "✅ Node.js: $(node -v), npm: $(npm -v)"

            echo "📦 Installing frontend dependencies..."
            cd frontend
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "🏗 Building frontend..."
            npm run build

            echo "📦 Installing backend dependencies..."
            cd ../backend
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "🔄 Restarting PM2 process..."
            if ! pm2 restart pullup-api; then
              if [ -f ecosystem.config.js ]; then
                echo "ℹ️ pm2 process not found, starting from ecosystem.config.js"
                pm2 start ecosystem.config.js --only pullup-api
              else
                echo "❌ Failed to restart pm2 process 'pullup-api' and no ecosystem.config.js found" >&2
                exit 1
              fi
            fi
            pm2 save

            echo "✅ Deployment complete"
            pm2 status pullup-api
