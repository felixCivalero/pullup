<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover"
    />

    <!-- Primary Meta -->
    <title>PullUp — the event platform for creators</title>
    <meta name="title" content="PullUp — the event platform for creators" />
    <meta
      name="description"
      content="Where your followers become your people. PullUp keeps the real relationships behind your work — across Instagram, WhatsApp and real life."
    />

    <!-- Open Graph. Absolute URLs so strict crawlers (Instagram via Facebook)
         don't drop the preview. Bump og-image ?v= whenever the card art
         changes to bust Facebook's ~24h cache. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pullup.se/" />
    <meta property="og:title" content="PullUp — the event platform for creators" />
    <meta
      property="og:description"
      content="Where your followers become your people. PullUp keeps the real relationships behind your work — across Instagram, WhatsApp and real life."
    />
    <meta property="og:image" content="https://pullup.se/og-image.jpg?v=2" />
    <meta property="og:image:secure_url" content="https://pullup.se/og-image.jpg?v=2" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PullUp — where your followers become your people" />
    <meta property="og:site_name" content="PullUp" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PullUp — the event platform for creators" />
    <meta
      name="twitter:description"
      content="Where your followers become your people. PullUp keeps the real relationships behind your work — across Instagram, WhatsApp and real life."
    />
    <meta name="twitter:image" content="https://pullup.se/og-image.jpg?v=2" />

    <!-- Theme -->
    <meta name="theme-color" content="#ffffff" />

    <!-- PWA / installed-app behaviour. iOS ignores the manifest's display mode,
         so these tell Safari to launch chrome-free from the home screen. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PullUp" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
